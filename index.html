<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종합 실시간 TV 플레이어</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #121212; color: #fff; font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .player-box { width: 100%; max-width: 960px; background: #000; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        video { width: 100%; aspect-ratio: 16 / 9; }
        .content { width: 100%; max-width: 960px; padding: 20px; box-sizing: border-box; }
        .category-title { border-left: 4px solid #007bff; padding-left: 10px; margin: 20px 0 10px; font-weight: bold; color: #007bff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
        button { padding: 10px 5px; border: 1px solid #333; background: #222; color: #ccc; cursor: pointer; border-radius: 4px; font-size: 0.85rem; transition: 0.2s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        button:hover { background: #333; color: #fff; }
        button.active { background: #007bff; color: #fff; border-color: #007bff; font-weight: bold; }
        .status-bar { padding: 10px; font-size: 0.8rem; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div class="player-box">
        <video id="video" controls autoplay></video>
        <div id="now-playing" class="status-bar">채널을 선택해 주세요.</div>
    </div>

    <div class="content">
        <div class="category-title">EBS</div>
        <div class="grid" id="ebs-grid"></div>

        <div class="category-title">KBS (실시간 주소)</div>
        <div class="grid" id="kbs-grid"></div>

        <div class="category-title">MBC</div>
        <div class="grid" id="mbc-grid"></div>

        <div class="category-title">SBS</div>
        <div class="grid" id="sbs-grid"></div>

        <div class="category-title">기타</div>
        <div class="grid" id="etc-grid"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('now-playing');
        let hls = new Hls();

        // 1. EBS 채널 정보
        const ebsChannels = [
            { name: "EBS1", url: "https://ebsonair.ebs.co.kr/groundwavefamilypc/familypc1m/playlist.m3u8" },
            { name: "EBS2", url: "https://ebsonair.ebs.co.kr/ebs2familypc/familypc1m/playlist.m3u8" },
            { name: "EBS Kids", url: "https://ebsonair.ebs.co.kr/ebsufamilypc/familypc1m/playlist.m3u8" },
            { name: "EBS+1", url: "https://ebsonair.ebs.co.kr/plus1familypc/familypc1m/playlist.m3u8" },
            { name: "EBS+2", url: "https://ebsonair.ebs.co.kr/plus2familypc/familypc1m/playlist.m3u8" },
            { name: "EBSe", url: "https://ebsonair.ebs.co.kr/plus3familypc/familypc1m/playlist.m3u8" },
            { name: "EBS FM", url: "https://ebsonair.ebs.co.kr/fmradiofamilypc/familypc1m/playlist.m3u8" },
            { name: "EBSbandi", url: "https://ebsonair.ebs.co.kr/cloud1/iradio/playlist.m3u8" }
        ];

        // 2. KBS 채널 정보
        const kbsChannels = [
            { name: "KBS 1TV", ch: "11" }, { name: "KBS 2TV", ch: "12" },
            { name: "KBS World", ch: "14" }, { name: "KBS 뉴스D", ch: "81" },
            { name: "KBS Drama", ch: "N91" }, { name: "KBS Joy", ch: "N92" },
            { name: "KBS Life", ch: "N93" }, { name: "KBS Story", ch: "N94" },
            { name: "KBS Kids", ch: "N96" }, { name: "썸, 마이웨이", ch: "nvod1" },
            { name: "태조왕건", ch: "nvod2" }, { name: "직장의 신", ch: "nvod3" },
            { name: "아이가 다섯", ch: "nvod4" }, { name: "제빵왕 김탁구", ch: "nvod5" },
            { name: "1박 2일", ch: "nvod6" }, { name: "내 딸 서영이", ch: "nvod7" },
            { name: "역사저널 그날", ch: "nvod8" }, { name: "인간극장", ch: "nvod9" },
            { name: "어린이 만화동산", ch: "nvod10" }, { name: "KBS 클래식FM", ch: "24" },
            { name: "KBS 쿨FM", ch: "25" }, { name: "KBS 1라디오", ch: "21" },
            { name: "KBS 2라디오", ch: "22" }, { name: "KBS 3라디오", ch: "23" },
            { name: "KBS 한민족방송", ch: "26" }, { name: "KBS 다언어", ch: "wink11" },
            { name: "KBS 영어", ch: "I92" }
        ];

        // 3. MBC 채널 정보
        const mbcChannels = [
            { name: "MBC강원영동TV", url: "http://123.254.93.7:1935/tvlive/livestream2/playlist.m3u8" },
            { name: "MBC대구TV", url: "https://5ee1ec6f32118.streamlock.net/live/livetv/playlist.m3u8" },
            { name: "MBC대전TV", url: "https://ns1.tjmbc.co.kr/live/myStream.sdp/playlist.m3u8" },
            { name: "MBC목포TV", url: "https://vod.mpmbc.co.kr/a_live/25246741/ch001/playlist.m3u8" },
            { name: "MBC전주TV", url: "https://5ee9633b25727.streamlock.net:443/jmbc_tv/jmbc_tv.stream/playlist.m3u8" },
            { name: "MBC제주TV", url: "https://wowza.jejumbc.com/live/tv_jejumbc/playlist.m3u8" },
            { name: "MBC춘천TV", url: "https://stream.chmbc.co.kr/TV/myStream/playlist.m3u8" },
            { name: "MBC충북TV", url: "http://211.33.246.4:32954/cj_live/myStream.sdp/playlist.m3u8" }
        ];

        // 4. SBS 채널 정보
        const sbsChannels = [
            { name: "G1강원TV", url: "http://61.82.49.4:1935/live/_definst_/tv.stream/playlist.m3u8" },
            { name: "KBC광주TV", url: "https://vod.ikbc.co.kr/KBCTV/tv/playlist.m3u8" },
            { name: "KNN부산경남", url: "https://stream1.knn.co.kr/hls/9ly4534y7dm2xfa123r2_tv/index.m3u8" },
            { name: "UBC울산TV", url: "https://stream.ubc.co.kr/hls/ubctvstream/index.m3u8" },
            { name: "JTV전주TV", url: "https://jtvonair.sbsoft.net/jtv_live/myStream/playlist.m3u8" },
            { name: "CJB청주TV", url: "http://1.222.207.80:1935/live/cjbtv/playlist.m3u8" },
            { name: "JIBS제주TV", url: "http://123.140.197.22/stream/1/play.m3u8" }
        ];

        // 5. 기타 채널 정보 (일부 생략 유지)
        const etcChannels = [
            { name: "TV CHOSUN", url: "https://onaircdn.tvchosun.com/origin1/_definst_/tvchosun_s1/playlist.m3u8" },
            { name: "국방TV", url: "http://mediaworks.dema.mil.kr:1935/live_edge/cudo.sdp/playlist.m3u8" },
            { name: "국회방송", url: "https://m.webcast.go.kr/live/_definst_/smil:natv_720p.smil/playlist.m3u8" }
        ];

        // 플레이어 재생 함수 (에러 핸들링 대폭 강화)
        function playStream(url, name) {
            status.style.color = "#ccc";
            status.innerText = "연결 중: " + name;
            
            if (Hls.isSupported()) {
                if(hls) {
                    hls.destroy();
                }
                hls = new Hls({
                    // 초기 로딩 에러 시 빠른 피드백을 위한 설정
                    manifestLoadingMaxRetry: 1,
                    levelLoadingMaxRetry: 1
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                // 재생 성공 시
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    status.style.color = "#00ff00";
                    status.innerText = "현재 재생 중: " + name;
                    video.play().catch(() => { status.innerText = "자동 재생이 브라우저에 의해 차단되었습니다. 플레이어의 재생 버튼을 눌러주세요."; });
                });

                // 에러 발생 시 원인 분석 및 출력
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                status.style.color = "#ff4d4d";
                                status.innerText = `재생 불가 (${name}): 브라우저 보안(CORS)에 의해 차단되었거나 서버가 응답하지 않습니다.`;
                                hls.destroy();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                status.style.color = "#ffcc00";
                                status.innerText = `복구 중 (${name}): 스트림 오류가 발생하여 복구를 시도합니다...`;
                                hls.recoverMediaError();
                                break;
                            default:
                                status.style.color = "#ff4d4d";
                                status.innerText = `재생 불가 (${name}): 스트림 주소가 만료되었거나 지원하지 않는 형식입니다.`;
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari 등 네이티브 HLS 지원 브라우저
                video.src = url;
                video.play();
                status.innerText = "현재 재생 중: " + name;
            }
            window.scrollTo(0, 0);
        }

        // KBS 주소 추출 및 재생
        async function loadKBS(chCode, name, btn) {
            setActive(btn);
            const apiUrl = `https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/${chCode}`;
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const streamUrl = data.channel_item[0].service_url;
                playStream(streamUrl, name);
            } catch (e) {
                status.style.color = "#ff4d4d";
                status.innerText = "KBS 채널 정보를 가져오지 못했습니다.";
            }
        }

        function setActive(target) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
        }

        // 버튼 생성 (코드가 너무 길어지지 않게 데이터 렌더링 로직 통합)
        function renderGrid(gridId, channels, isKbs = false) {
            const grid = document.getElementById(gridId);
            channels.forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c.name;
                btn.onclick = () => {
                    if(isKbs) loadKBS(c.ch, c.name, btn);
                    else { setActive(btn); playStream(c.url, c.name); }
                };
                grid.appendChild(btn);
            });
        }

        renderGrid('ebs-grid', ebsChannels);
        renderGrid('kbs-grid', kbsChannels, true);
        renderGrid('mbc-grid', mbcChannels);
        renderGrid('sbs-grid', sbsChannels);
        renderGrid('etc-grid', etcChannels);

    </script>
</body>
</html>
